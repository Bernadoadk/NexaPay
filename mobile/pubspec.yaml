name: NexaPay
description: NexaPay — Application mobile de gestion de devis
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.3
  flutter_secure_storage: ^9.2.2
  provider: ^6.1.2
  intl: ^0.19.0
  url_launcher: ^6.3.0
  share_plus: ^9.0.0
  image_picker: ^1.1.2
  pdf: ^3.11.1
  printing: ^5.13.1
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.1
  crypto: ^3.0.3
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - lib/assets/Logo.png
    - lib/assets/Logo-dark.png
    - lib/assets/Icon.png
